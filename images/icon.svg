<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="branchLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#89b4fa"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9e2af"/>
      <stop offset="100%" style="stop-color:#fab387"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="20" ry="20" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <circle cx="24" cy="24" r="1" fill="#313244" opacity="0.6"/>
  <circle cx="48" cy="24" r="1" fill="#313244" opacity="0.6"/>
  <circle cx="72" cy="24" r="1" fill="#313244" opacity="0.6"/>
  <circle cx="96" cy="24" r="1" fill="#313244" opacity="0.6"/>
  <circle cx="24" cy="104" r="1" fill="#313244" opacity="0.6"/>
  <circle cx="96" cy="104" r="1" fill="#313244" opacity="0.6"/>

  <!-- Git branch vertical line -->
  <line x1="40" y1="28" x2="40" y2="100" stroke="url(#branchLine)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Feature branch curve -->
  <path d="M 40 50 Q 40 38 52 38" stroke="#cba6f7" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <line x1="52" y1="38" x2="72" y2="38" stroke="#cba6f7" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Commit nodes on main branch -->
  <circle cx="40" cy="34" r="5.5" fill="#1e1e2e" stroke="#89b4fa" stroke-width="2.5" filter="url(#softglow)"/>
  <circle cx="40" cy="64" r="5.5" fill="#1e1e2e" stroke="#cba6f7" stroke-width="2.5" filter="url(#softglow)"/>
  <circle cx="40" cy="94" r="5.5" fill="#1e1e2e" stroke="#89b4fa" stroke-width="2.5" filter="url(#softglow)"/>

  <!-- Feature branch commit node -->
  <circle cx="72" cy="38" r="5.5" fill="#1e1e2e" stroke="#cba6f7" stroke-width="2.5" filter="url(#softglow)"/>

  <!-- Commit message lines (after main commit node) -->
  <rect x="53" y="61" width="28" height="3.5" rx="1.8" fill="#585b70" opacity="0.9"/>
  <rect x="53" y="68" width="18" height="3.5" rx="1.8" fill="#45475a" opacity="0.7"/>

  <!-- Sparkle icon (top-right area) -->
  <g transform="translate(83, 72)" filter="url(#glow)">
    <!-- 4-point star -->
    <path d="M 0 -16 L 3.2 -3.2 L 16 0 L 3.2 3.2 L 0 16 L -3.2 3.2 L -16 0 L -3.2 -3.2 Z"
          fill="url(#sparkle)" opacity="0.95"/>
    <!-- Small sparkles -->
    <circle cx="14" cy="-14" r="2.2" fill="#f9e2af" opacity="0.8"/>
    <circle cx="-13" cy="13" r="1.5" fill="#fab387" opacity="0.6"/>
    <circle cx="16" cy="10" r="1.2" fill="#f9e2af" opacity="0.5"/>
  </g>
</svg>
